apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: open5gs
resources:
  - common
  - slices
images:
  - name: ghcr.io/niloysh/open5gs
    newTag: v2.7.0
patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: r2labuser/open5gs-amf-patched:v2.7.0
    target:
      kind: Deployment
      name: open5gs-amf

